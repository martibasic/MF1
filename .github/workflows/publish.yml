name: Publish Website

on:
  push:
    branches: [ main ]

jobs:
  quarto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Ako imate Julia/Python ovisnosti, ovdje bi išli koraci za instalaciju.
      # Za sada pretpostavljamo da su widgeti self-contained HTML.

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
